<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MamaSign Mobile Contract Form Demo</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #111827;
      --muted: #5b6472;
      --line: #d9e2ec;
      --accent: #0f766e;
      --bg: #f6f8fb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    main {
      width: min(760px, calc(100vw - 28px));
      margin: 24px auto 36px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
    }
    .player {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #000;
      box-shadow: 0 18px 45px rgba(15, 23, 42, .14);
    }
    video {
      display: block;
      width: 100%;
      height: auto;
      background: #000;
    }
    .meta {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>MamaSign Mobile Contract Form Demo</h1>
    <p>Responsive public contract form with mobile signature draw/apply.</p>
    <div class="player">
      <video controls playsinline preload="metadata" poster="poster.png" src="demo.mp4"></video>
    </div>
    <div class="meta">Recorded in an iPhone viewport. No form submission was made.</div>
  </main>
</body>
</html>
