<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MamaSign Contract Builder Mobile Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #152033;
        background: #eef3f8;
      }

      main {
        width: min(1120px, calc(100% - 28px));
        margin: 0 auto;
        padding: 24px 0 32px;
      }

      header {
        margin-bottom: 18px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: clamp(24px, 4vw, 40px);
        line-height: 1.05;
      }

      p {
        margin: 0;
        max-width: 740px;
        color: #56657a;
        font-size: 15px;
        line-height: 1.55;
      }

      .video-shell {
        overflow: hidden;
        border: 1px solid #ccd7e5;
        border-radius: 8px;
        background: #0f172a;
        box-shadow: 0 18px 42px rgba(15, 23, 42, 0.15);
      }

      video {
        display: block;
        width: 100%;
        max-height: 82vh;
        background: #0f172a;
      }

      .screens {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin-top: 16px;
      }

      figure {
        margin: 0;
        overflow: hidden;
        border: 1px solid #ccd7e5;
        border-radius: 8px;
        background: #fff;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
      }

      figcaption {
        padding: 10px 12px;
        border-top: 1px solid #e1e7ef;
        color: #435168;
        font-size: 13px;
        font-weight: 700;
      }

      @media (max-width: 760px) {
        main {
          width: min(430px, calc(100% - 20px));
          padding-top: 14px;
        }

        .screens {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>MamaSign Contract Builder Mobile Preview</h1>
        <p>
          Isolated preview for the responsive contract form builder layout. It shows the mobile document canvas,
          field tools, and field settings after the latest staging code change.
        </p>
      </header>

      <section class="video-shell" aria-label="Mobile preview video">
        <video controls playsinline preload="metadata" poster="poster.png" src="demo.mp4"></video>
      </section>

      <section class="screens" aria-label="Preview screenshots">
        <figure>
          <img src="poster.png" alt="Mobile document canvas with visible fields" />
          <figcaption>Document canvas</figcaption>
        </figure>
        <figure>
          <img src="fields-panel.png" alt="Mobile fields panel below document" />
          <figcaption>Fields panel</figcaption>
        </figure>
        <figure>
          <img src="settings-panel.png" alt="Mobile field settings panel below tools" />
          <figcaption>Field settings</figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
