<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MamaSign Simple Mobile Signing Review</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #111827;
        --muted: #64748b;
        --line: #dbe3eb;
        --brand: #0d9488;
        --bg: #f5f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      header {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 4vw, 44px);
        line-height: 1.08;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.6;
      }

      .panel {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.07);
      }

      .video-wrap {
        margin-bottom: 24px;
      }

      video,
      img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 6px;
        border: 1px solid var(--line);
        background: #fff;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 20px;
      }

      figure {
        margin: 0;
      }

      figcaption {
        margin: 0 0 10px;
        color: var(--ink);
        font-size: 15px;
        font-weight: 700;
      }

      .checks {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      .check {
        border: 1px solid rgba(13, 148, 136, 0.32);
        background: rgba(13, 148, 136, 0.08);
        color: #0f766e;
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 13px;
        font-weight: 700;
      }

      @media (max-width: 760px) {
        main {
          width: min(100% - 20px, 520px);
          padding-top: 20px;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .panel {
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>MamaSign Simple Mobile Signing Review</h1>
        <p>Local mocked recipient flow for checking the simplified Japanese mobile signing screen before any production rollout.</p>
        <div class="checks" aria-label="Validated checks">
          <span class="check">No horizontal overflow</span>
          <span class="check">No field-add menu</span>
          <span class="check">No red color option</span>
          <span class="check">No save-signature checkbox</span>
          <span class="check">Sender signature locked</span>
        </div>
      </header>

      <section class="panel video-wrap" aria-labelledby="video-title">
        <figure>
          <figcaption id="video-title">Mobile walkthrough video</figcaption>
          <video controls playsinline preload="metadata" poster="mobile-simple-screen.png">
            <source src="mobile-simple-review.mp4" type="video/mp4" />
            <source src="mobile-simple-review.webm" type="video/webm" />
          </video>
        </figure>
      </section>

      <section class="grid" aria-label="Screenshots">
        <figure class="panel">
          <figcaption>Simple mobile signing screen</figcaption>
          <img src="mobile-simple-screen.png" alt="Simple mobile signing screen with required field checklist and locked sender signature" />
        </figure>
        <figure class="panel">
          <figcaption>Simplified signature popup</figcaption>
          <img src="mobile-signature-pad.png" alt="Simplified Japanese signature popup with bordered drawing area and eraser icon" />
        </figure>
      </section>
    </main>
  </body>
</html>
