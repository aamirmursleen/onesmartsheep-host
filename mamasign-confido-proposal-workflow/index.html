<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MamaSign Confido Legal Proposal Workflow</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101214;
        color: #f4f6f8;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #101214;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        padding: 28px 0;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(22px, 3vw, 34px);
        font-weight: 700;
        letter-spacing: 0;
      }

      video {
        width: 100%;
        max-height: calc(100vh - 120px);
        display: block;
        background: #000;
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MamaSign Confido Legal Proposal Workflow</h1>
      <video controls playsinline preload="metadata">
        <source src="./mamasign-confido-proposal-workflow.mp4" type="video/mp4">
      </video>
    </main>
  </body>
</html>
